<!-- -----------------------------------------------------------------
ARCHIVO: products.component.html
FUNCIÓN: Pantalla de gestión de productos (lista + formulario crear)
----------------------------------------------------------------- -->

<div class="row">
  <!-- COLUMNA DEL FORMULARIO (crear producto) -->
  <div class="col-md-4">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">➕ Nuevo Producto</h5>
      </div>
      <div class="card-body">
        
        <!-- Mensajes de éxito/error -->
        <div *ngIf="message" class="alert alert-success">{{ message }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
        
        <form (ngSubmit)="createProduct()">
          <div class="mb-2">
            <label class="form-label">Nombre *</label>
            <input type="text" class="form-control" [(ngModel)]="newProduct.name" name="name" required>
          </div>
          
          <div class="mb-2">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" [(ngModel)]="newProduct.description" name="description"></textarea>
          </div>
          
          <div class="mb-2">
            <label class="form-label">Precio *</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="newProduct.price" name="price" required>
          </div>
          
          <div class="mb-2">
            <label class="form-label">SKU * (código único)</label>
            <input type="text" class="form-control" [(ngModel)]="newProduct.sku" name="sku" required>
          </div>
          
          <div class="mb-2">
            <label class="form-label">Categoría</label>
            <select class="form-control" [(ngModel)]="newProduct.category_id" name="category_id">
              <option value="">Sin categoría</option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
            </select>
          </div>
          
          <button type="submit" class="btn btn-primary w-100">Crear Producto</button>
        </form>
      </div>
    </div>
  </div>
  
  <!-- COLUMNA DE LA TABLA (listar productos) -->
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-secondary text-white">
        <h5 class="mb-0">📋 Lista de Productos</h5>
      </div>
      <div class="card-body">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>Nombre</th><th>SKU</th><th>Precio</th><th>Categoría</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let product of products">
              <td>{{ product.name }}</td>
              <td>{{ product.sku }}</td>
              <td>${{ product.price }}</td>
              <td>{{ product.category_id?.name || 'Sin categoría' }}</td>
              <td>
                <button class="btn btn-danger btn-sm" (click)="deleteProduct(product.id)">🗑 Eliminar</button>
              </td>
            </tr>
            <tr *ngIf="products.length === 0">
              <td colspan="5" class="text-center">No hay productos registrados</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
